<!DOCTYPE html>

    <title>Tarjeta de noticia</title>
    <link rel="stylesheet" href="styles.css" />

  <body>
    <main class="main">
      <article class="card">

        </div>

        <div class="div_titulo">
          <h1 class="titulo">La Inteligencia Artificial redefine la productividad global</h1>

            aprendemos y tomamos decisiones, acelerando la transformación digital en todos los sectores.
          </p>

          <div class="autor">
            <span>Por Ana Pérez</span>
            <span>• 19 de mayo de 2026</span>
          </div>
